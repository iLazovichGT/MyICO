<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Система учёта</title>

  <!-- Иконка на домашний экран iPhone. Эта страница НЕ в iframe (в отличие от GAS),
       поэтому Safari читает apple-touch-icon отсюда. Файл 180x180 без прозрачности. -->
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/iLazovichGT/MyICO/main/liderpol-favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/iLazovichGT/MyICO/main/apple-touch-icon.png">

  <!-- Полноэкранный режим + подпись под иконкой -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Система учёта">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F6FA">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0F0F14">

  <style>
    /* Тема — по устройству (решение Ирины 16.07): светлая/тёмная как системная,
       цвета = токенам приложения (--bg/--t1: #F5F6FA/#1A1B2E и #0F0F14/#F0F0F5). */
    html, body {
      margin: 0; height: 100%;
      background: #F5F6FA;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1A1B2E;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      -webkit-text-size-adjust: 100%;
      overflow: hidden; overscroll-behavior: none;
    }
    img { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 8px 24px rgba(0,0,0,.22); }
    .t { font-size: 20px; font-weight: 700;
         background: linear-gradient(135deg, #6C5CE7, #A388EE);
         -webkit-background-clip: text; background-clip: text;
         -webkit-text-fill-color: transparent; }
    .s { font-size: 14px; opacity: .8; }
    a { color: #6C5CE7; }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0F0F14; color: #F0F0F5; }
      a { color: #A388EE; }
      .t { background: none; -webkit-text-fill-color: currentColor; }
    }
    /* Приложение во весь экран поверх заставки (заставка видна, пока GAS грузится). */
    #app {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: 0; z-index: 10; background: transparent;
    }
  </style>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // Обёртка = (1) иконка на «Домой» iPhone + (2) ХРАНИТЕЛЬ ВХОДА + (3) РАМКА.
    //
    // Почему хранитель здесь: приложение GAS живёт в стороннем iframe
    // (googleusercontent.com), а iOS в standalone-режиме (запуск с иконки)
    // НЕ сохраняет localStorage сторонних iframe между запусками — токен
    // «запомнить устройство» стирался, и логин/пароль спрашивало каждый раз.
    // localStorage ЭТОЙ страницы — первая сторона, живёт.
    //
    // Почему РАМКА (iframe), а не редирект (изменение 16.07): iOS показывает
    // панели Safari (адресная строка сверху + тулбар снизу), как только
    // standalone-приложение УХОДИТ с домена иконки на чужой домен. Держим
    // приложение во весь экран в iframe — верхний домен остаётся наш,
    // панели не появляются. Токен приложение возвращает postMessage'м
    // (см. слушатель ниже); старый канал «навигация на #app=X&st=…»
    // сохранён для запуска обычной вкладкой Safari (там iframe не нужен).
    // ═══════════════════════════════════════════════════════════════════════

    // Белый список приложений (токен никуда, кроме них, не уйдёт).
    // dev — разработка (Ирина, база TEST); prod — боевая система клиента.
    // ЭТОТ файл — обёртка РАЗРАБОТЧИКА (репо iLazovichGT/MyICO): DEFAULT_APP='dev'.
    // В копии для репозитория КЛИЕНТА DEFAULT_APP='prod' (см. client-repo/index.html).
    var APPS = {
      prod: "https://script.google.com/macros/s/AKfycbyM9X4IeQ9QxX_G1FqjcWGoz-eXVqxInIO1J9XlT1nCOwf53Sm-i6g-YXb2buUJAyTJ1g/exec",
      dev:  "https://script.google.com/macros/s/AKfycbzkmQyfuE5iSTwk3-nLjt0ZZAud9vbTHuToTka-KV83zJ60LyAV0BXoyLaQ1k9PQhOI/exec"
    };
    var DEFAULT_APP = "dev";
    // Режим показа по приложениям. prod (доступ «Все», анонимный) — IFRAME: без панелей Safari.
    // dev — доступ «по Google-аккаунту»: в стороннем iframe Safari НЕ отдаёт Google-cookies
    // (третья сторона) → Google 4003 «нет доступа» (факт 16.07). Поэтому dev — РЕДИРЕКТ,
    // как раньше (панели Safari остаются — цена Google-входа на dev).
    var EMBED = { prod: true, dev: false };
    var LS_TOKEN = "liderp_st";   // база ключа токена; храним ПО ПРИЛОЖЕНИЯМ: liderp_st_dev / liderp_st_prod
    var LS_APP   = "liderp_app";  // какое приложение запускаем с этого устройства (prod|dev)

    // Параметры из query (?app=…) И из hash (#app=…&st=…/clear=1). Query важен для иконки:
    // iOS сохраняет URL страницы в момент добавления на «Домой» — вместе с ?app=…, поэтому
    // выбор приложения переживает запуск в standalone (localStorage Safari туда НЕ переносится).
    // Hash — канал команд от приложения ПРИ РЕДИРЕКТ-ЗАПУСКЕ (вкладка Safari): сохранить токен
    // (#app=X&st=…) / стереть (#app=X&clear=1). В iframe-режиме команды идут postMessage'м.
    var h = {};
    (location.search.replace(/^\?/, "") + "&" + location.hash.replace(/^#/, ""))
      .split("&").forEach(function (p) {
        if (!p) return;
        var i = p.indexOf("=");
        h[i < 0 ? p : p.slice(0, i)] = i < 0 ? "1" : decodeURIComponent(p.slice(i + 1));
      });
    if (h.app && APPS[h.app]) { try { localStorage.setItem(LS_APP, h.app); } catch (e) {} }

    var appKey = (h.app && APPS[h.app]) ? h.app : DEFAULT_APP;
    try { appKey = localStorage.getItem(LS_APP) || appKey; } catch (e) {}
    if (!APPS[appKey]) appKey = DEFAULT_APP;

    // Токен — отдельный на каждое приложение (dev-токен не должен уезжать в prod и наоборот).
    // Старый общий ключ liderp_st читаем как наследие ТОЛЬКО для dev (токены копились в обкатке dev).
    function tokenKey() { return LS_TOKEN + "_" + appKey; }
    function getToken() {
      var t = null;
      try {
        t = localStorage.getItem(tokenKey());
        if (!t && appKey === "dev") t = localStorage.getItem(LS_TOKEN);
      } catch (e) {}
      return t;
    }
    function setToken(t) {
      try { localStorage.setItem(tokenKey(), String(t)); localStorage.removeItem(LS_TOKEN); } catch (e) {}
    }
    function clearToken() {
      try { localStorage.removeItem(tokenKey()); localStorage.removeItem(LS_TOKEN); } catch (e) {}
    }

    // Команды старого канала (навигацией) — обрабатываем до построения ссылки.
    if (h.st)    setToken(h.st);
    if (h.clear) clearToken();

    // Ссылка в приложение: ключ приложения + сохранённый токен (если есть).
    function appHref() {
      var t = getToken();
      return APPS[appKey] + "?icon=" + appKey + (t ? "&st=" + encodeURIComponent(t) : "");
    }

    // Канал команд от приложения в iframe-режиме: postMessage {liderp:1, st:…|clear:1}.
    // Принимаем ТОЛЬКО от Google-доменов, где живёт наше приложение (iframe GAS —
    // *.googleusercontent.com, страница развёртывания — script.google.com).
    window.addEventListener("message", function (ev) {
      var d = ev.data || {};
      if (d.liderp !== 1) return;
      var okOrigin = ev.origin === "https://script.google.com" ||
                     /^https:\/\/[^\/]+\.googleusercontent\.com$/.test(ev.origin);
      if (!okOrigin) return;
      if (d.st)    setToken(d.st);
      if (d.clear) clearToken();
    });

    // Определяем: открыто ли из иконки «Домой» (standalone) или обычной вкладкой Safari.
    var standalone = (window.navigator.standalone === true) ||
                     (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);

    // Иконка «Домой» → приложение ВНУТРИ страницы (iframe): домен не меняется → нет панелей Safari.
    // Только для приложений с анонимным доступом (EMBED) — иначе Google 403 в стороннем iframe.
    // &lo=1 после «Выйти» старым каналом: приложение НЕ автоопознаёт по Google эту загрузку.
    if (standalone && EMBED[appKey]) {
      document.addEventListener("DOMContentLoaded", function () {
        var f = document.createElement("iframe");
        f.id = "app";
        f.setAttribute("allow", "clipboard-write");
        f.src = appHref() + (h.clear ? "&lo=1" : "");
        document.body.appendChild(f);
      });
    } else if (standalone || h.st || h.clear) {
      // Редирект-режим: (а) standalone для приложений БЕЗ iframe (dev — Google-вход, панели
      // Safari остаются); (б) вкладка Safari, вернулись командой от приложения (записали/стёрли
      // токен выше) — сразу обратно в приложение. После «Выйти» — с одноразовым &lo=1.
      location.replace(appHref() + (h.clear ? "&lo=1" : ""));
    }
  </script>
</head>
<body>
  <img src="https://raw.githubusercontent.com/iLazovichGT/MyICO/main/apple-touch-icon.png" alt="Система учёта">
  <div class="t">Система учёта</div>
  <div class="s" id="hint">Открываем приложение…</div>

  <script>
    // Обычная вкладка (не с иконки): на ТЕЛЕФОНЕ — инструкция «На экран Домой» + ссылка;
    // на ДЕСКТОПЕ инструкция бессмысленна (жалоба Ирины 16.07) — сразу открываем приложение.
    if (!standalone && !h.st && !h.clear) {
      var ua = navigator.userAgent || "";
      var isMobile = /iPhone|iPad|iPod|Android/i.test(ua) ||
                     (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1); // iPad прикидывается Mac
      if (isMobile) {
        document.getElementById('hint').innerHTML =
          'Нажмите «Поделиться» → «На экран „Домой"».<br><br>' +
          '<a href="' + appHref() + '">Или открыть приложение сейчас →</a>';
      } else {
        location.replace(appHref());
      }
    }
  </script>
</body>
</html>
